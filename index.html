<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mental health self-assessment platform with 22 validated screening tests in 12 languages">
  <meta name="theme-color" content="#F7F4F0" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)">
  <title>Salud Mental — Autoevaluación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg-primary: #F7F4F0;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #EDE8E1;
      --text-primary: #2D2A26;
      --text-secondary: #4A4540;
      --text-muted: #706A62;
      --accent: #6B8F71;
      --accent-light: #8BAF91;
      --accent-dark: #4A6B50;
      --accent-glow: rgba(107, 143, 113, 0.15);
      --border: rgba(45, 42, 38, 0.1);
      --shadow-sm: 0 2px 8px rgba(45, 42, 38, 0.06);
      --shadow-md: 0 8px 24px rgba(45, 42, 38, 0.08);
      --shadow-lg: 0 16px 48px rgba(45, 42, 38, 0.12);
      --disclaimer-bg: #FFF8F0;
      --disclaimer-border: #C9A227;
      --privacy-bg: #F0F8F0;
      --privacy-border: #6B8F71;
      --resources-bg: #F0F7F1;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
    }

    /* ─── Dark Mode ─── */
    html[data-theme="dark"] {
      --bg-primary: #1A1A1E;
      --bg-secondary: #26262A;
      --bg-tertiary: #32323A;
      --text-primary: #EDEDF0;
      --text-secondary: #B0AEA8;
      --text-muted: #8A8880;
      --accent: #8BAF91;
      --accent-light: #A5C9A9;
      --accent-dark: #6B8F71;
      --accent-glow: rgba(139, 175, 145, 0.12);
      --border: rgba(255, 255, 255, 0.1);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
      --disclaimer-bg: #2A2520;
      --disclaimer-border: #B1943A;
      --privacy-bg: #202A22;
      --privacy-border: #6B8F71;
      --resources-bg: #202A22;
    }
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg-primary: #1A1A1E; --bg-secondary: #26262A; --bg-tertiary: #32323A;
        --text-primary: #EDEDF0; --text-secondary: #B0AEA8; --text-muted: #8A8880;
        --accent: #8BAF91; --accent-light: #A5C9A9; --accent-dark: #6B8F71;
        --accent-glow: rgba(139, 175, 145, 0.12);
        --border: rgba(255, 255, 255, 0.1);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
        --disclaimer-bg: #2A2520; --disclaimer-border: #B1943A;
        --privacy-bg: #202A22; --privacy-border: #6B8F71; --resources-bg: #202A22;
      }
    }

    /* ─── Base ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 1rem 0.75rem 3rem; }

    /* ─── Accessibility ─── */
    .skip-link {
      position: absolute; top: -100%; left: 1rem;
      background: var(--accent); color: white;
      padding: 0.5rem 1rem; border-radius: var(--radius-sm);
      font-weight: 600; text-decoration: none; z-index: 10000;
    }
    .skip-link:focus { top: 1rem; }
    *:focus-visible {
      outline: 3px solid var(--accent-light);
      outline-offset: 3px;
      border-radius: 4px;
    }
    .option input:focus-visible + label {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ─── Header ─── */
    .app-header { text-align: center; margin-bottom: 1.25rem; }
    .app-header h1 {
      font-family: var(--font-display); font-size: 1.5rem;
      color: var(--text-primary); letter-spacing: -0.02em; cursor: pointer;
    }
    .app-header p { color: var(--text-muted); font-size: 0.82rem; margin-top: 0.15rem; }
    .header-controls {
      display: flex; flex-wrap: wrap; justify-content: center;
      align-items: center; gap: 0.5rem; margin-top: 0.5rem;
    }

    /* ─── Language Selector ─── */
    .lang-selector {
      display: flex; gap: 0.2rem; justify-content: center; flex-wrap: wrap;
    }
    .lang-btn {
      min-width: 36px; min-height: 36px;
      padding: 0.3rem 0.5rem; border: 1.5px solid var(--border);
      border-radius: 8px; background: transparent; font-family: var(--font-body);
      font-size: 0.68rem; font-weight: 600; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s var(--ease-out);
      letter-spacing: 0.03em;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .lang-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .lang-btn.active {
      background: var(--accent); color: white;
      border-color: var(--accent);
    }

    /* ─── Theme Toggle ─── */
    .theme-toggle {
      min-width: 36px; min-height: 36px;
      padding: 0.3rem; border: 1.5px solid var(--border);
      border-radius: 8px; background: transparent;
      cursor: pointer; font-size: 1rem;
      transition: all 0.2s var(--ease-out);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .theme-toggle:hover { border-color: var(--text-muted); }

    /* ─── Tabs ─── */
    .tabs {
      display: flex; gap: 0.25rem; background: var(--bg-tertiary);
      padding: 4px; border-radius: var(--radius-sm); margin-bottom: 1.25rem;
    }
    .tab {
      flex: 1; min-height: 44px;
      padding: 0.55rem 0.75rem; border: none; background: transparent;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border-radius: 8px;
      transition: all 0.25s var(--ease-out);
    }
    .tab:hover:not(.active) { color: var(--text-primary); }
    .tab.active {
      background: var(--bg-secondary); color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ─── Screens ─── */
    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp 0.35s var(--ease-out); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Test Grid (Mobile-first) ─── */
    .test-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    @media (min-width: 540px) {
      .test-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    }
    @media (min-width: 900px) {
      .container { max-width: 900px; }
      .test-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .test-card {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 1.25rem; box-shadow: var(--shadow-sm); cursor: pointer;
      transition: all 0.3s var(--ease-out); border: 2px solid transparent;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateY(12px);
      animation: cardReveal 0.5s var(--ease-out) forwards;
    }
    .category-header {
      opacity: 0; animation: cardReveal 0.4s var(--ease-out) forwards;
    }
    .category-header:first-child { margin-top: 0 !important; }
    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    .test-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(120% 120% at 0% 0%, var(--card-accent, var(--accent)) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.4s;
    }
    .test-card:hover::before { opacity: 0.08; }
    @media (hover: hover) {
      .test-card:hover {
        transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow-md);
        border-color: var(--card-accent, var(--accent));
      }
    }
    .test-card:active { transform: translateY(-1px) scale(0.99); }
    .test-card .card-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .test-card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.65rem; font-size: 1.25rem;
    }
    .test-card h3 {
      font-family: var(--font-display); font-size: 0.95rem; margin-bottom: 0.1rem;
    }
    .test-card .card-abbr {
      font-size: 0.68rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem;
    }
    .test-card p {
      font-size: 0.78rem; color: var(--text-muted); line-height: 1.5;
    }
    .test-card .card-meta {
      font-size: 0.68rem; color: var(--text-muted); margin-top: 0.5rem;
      display: flex; gap: 0.75rem;
    }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      min-height: 44px;
      padding: 0.75rem 1.75rem; font-family: var(--font-body); font-size: 0.9rem;
      font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.25s var(--ease-out);
    }
    .btn-primary {
      background: var(--accent); color: white;
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .btn-primary:hover {
      background: var(--accent-dark); transform: translateY(-1px);
      box-shadow: 0 6px 16px var(--accent-glow);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline {
      background: transparent; color: var(--accent); border: 2px solid var(--accent);
    }
    .btn-outline:hover { background: var(--accent-glow); }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      padding: 0.5rem 0.75rem; font-size: 0.82rem;
    }
    .btn-ghost:hover { color: var(--text-primary); }

    /* ─── Welcome Card ─── */
    .welcome-card {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 1.75rem 1.25rem; box-shadow: var(--shadow-md); text-align: center;
    }
    .welcome-icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem; font-size: 1.5rem;
    }
    .welcome-card h2 { font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 0.75rem; }
    .welcome-card p {
      color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; line-height: 1.7;
    }
    .disclaimer {
      background: var(--disclaimer-bg); border-left: 3px solid var(--disclaimer-border);
      padding: 0.85rem 1rem; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 1rem 0; text-align: left; font-size: 0.78rem;
      color: var(--text-secondary); line-height: 1.6;
    }

    /* ─── Progress ─── */
    .progress-section { margin-bottom: 1.25rem; }
    .progress-info {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.4rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 500;
    }
    .progress-bar {
      width: 100%; height: 5px; background: var(--bg-tertiary);
      border-radius: 100px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 100px;
      transition: width 0.5s var(--ease-out); position: relative;
    }
    .progress-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ─── Question Card ─── */
    .question-card {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 1.25rem; box-shadow: var(--shadow-md);
      min-height: 300px; display: flex; flex-direction: column;
    }
    .question-number {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 0.6rem;
    }
    .question-title {
      font-family: var(--font-display); font-size: 1.05rem;
      margin-bottom: 1rem; color: var(--text-primary);
    }
    .options { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; }
    .option { position: relative; }
    .option input { position: absolute; opacity: 0; pointer-events: none; }
    .option label {
      display: flex; align-items: flex-start; gap: 0.65rem;
      min-height: 44px;
      padding: 0.7rem 0.85rem; border: 2px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.2s var(--ease-out); font-size: 0.85rem;
      line-height: 1.45; color: var(--text-secondary);
    }
    .option label:hover { border-color: var(--accent-light); background: var(--accent-glow); }
    .option input:checked + label {
      border-color: var(--accent); background: var(--accent-glow);
      color: var(--text-primary); font-weight: 500;
    }
    .option-radio {
      width: 18px; height: 18px; min-width: 18px;
      border: 2px solid var(--border); border-radius: 50%; margin-top: 1px;
      transition: all 0.2s var(--ease-out);
      display: flex; align-items: center; justify-content: center;
    }
    .option input:checked + label .option-radio {
      border-color: var(--accent); background: var(--accent);
    }
    .option input:checked + label .option-radio::after {
      content: ''; width: 7px; height: 7px; background: white;
      border-radius: 50%; animation: popIn 0.25s var(--ease-spring);
    }
    @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

    .question-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1.25rem; padding-top: 0.85rem; border-top: 1px solid var(--border);
    }
    .question-content { animation: slideIn 0.3s var(--ease-out); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ─── Results ─── */
    .results-card {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 1.75rem 1.25rem; box-shadow: var(--shadow-md); text-align: center;
    }
    .score-circle {
      width: 110px; height: 110px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; margin: 0 auto 1rem;
      animation: scaleIn 0.5s var(--ease-spring);
    }
    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .score-number {
      font-family: var(--font-display); font-size: 2.25rem; color: white; line-height: 1;
    }
    .score-label {
      font-size: 0.65rem; color: rgba(255,255,255,0.85);
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .score-category {
      font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 0.4rem;
    }
    .score-description {
      color: var(--text-secondary); font-size: 0.85rem;
      max-width: 440px; margin: 0 auto 1.5rem; line-height: 1.7;
    }
    .breakdown {
      text-align: left; border-top: 1px solid var(--border);
      padding-top: 1.25rem; margin-top: 0.75rem;
    }
    .breakdown h3 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 0.75rem; }
    .breakdown-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; font-size: 0.8rem; border-bottom: 1px solid var(--border);
    }
    .breakdown-item:last-child { border-bottom: none; }
    .breakdown-name { color: var(--text-secondary); flex: 1; }
    .breakdown-value {
      font-weight: 600; padding: 0.15rem 0.55rem;
      border-radius: 100px; font-size: 0.75rem;
    }
    .results-actions {
      display: flex; gap: 0.75rem; justify-content: center;
      margin-top: 1.5rem; flex-wrap: wrap;
    }
    .resources-box {
      background: var(--resources-bg); border-radius: var(--radius-sm);
      padding: 1rem; margin-top: 1.25rem; text-align: left;
    }
    .resources-box h4 {
      font-size: 0.8rem; font-weight: 600; color: var(--accent-dark); margin-bottom: 0.35rem;
    }
    .resources-box p { font-size: 0.75rem; color: var(--text-secondary); line-height: 1.6; }

    /* ─── History ─── */
    .history-empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); }
    .history-filter {
      display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .filter-btn {
      min-height: 36px;
      padding: 0.4rem 0.8rem; border: 1.5px solid var(--border);
      border-radius: 100px; background: transparent; font-family: var(--font-body);
      font-size: 0.72rem; font-weight: 500; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s var(--ease-out);
    }
    .filter-btn:hover { border-color: var(--text-muted); }
    .filter-btn.active {
      background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary);
    }
    .chart-container {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 1.25rem; box-shadow: var(--shadow-sm); margin-bottom: 1.25rem;
    }
    .chart-container h3 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 0.75rem; }
    .chart-wrapper { position: relative; height: 200px; }
    .history-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .history-entry {
      background: var(--bg-secondary); border-radius: var(--radius-sm);
      padding: 0.85rem 1rem; box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 0.75rem;
      transition: all 0.2s var(--ease-out);
    }
    .history-entry:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; min-width: 8px; }
    .history-info { flex: 1; }
    .history-date { font-size: 0.72rem; color: var(--text-muted); }
    .history-score-text { font-weight: 600; font-size: 0.82rem; }
    .history-test-name { font-size: 0.68rem; color: var(--text-muted); }
    .history-badge {
      font-size: 0.65rem; font-weight: 600; padding: 0.15rem 0.5rem;
      border-radius: 100px; color: white; white-space: nowrap;
    }
    .history-trend { font-size: 1rem; min-width: 24px; text-align: center; }
    .clear-history { text-align: center; margin-top: 1.25rem; }

    /* ─── Responsive (tablet+) ─── */
    @media (min-width: 540px) {
      .container { padding: 1.5rem 1.25rem 4rem; }
      .app-header h1 { font-size: 1.75rem; }
      .question-card { padding: 1.75rem; min-height: 340px; }
      .welcome-card { padding: 2rem 1.75rem; }
      .results-card { padding: 2rem 1.75rem; }
      .welcome-card h2 { font-size: 1.35rem; }
      .question-title { font-size: 1.1rem; }
    }
    @media (max-width: 539px) {
      .results-actions { flex-direction: column; }
      .results-actions .btn { width: 100%; }
      .dichotomy-label, .dichotomy-label-right { width: 60px; font-size: 0.65rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.15s !important;
      }
    }

    /* ─── Breadcrumb ─── */
    .breadcrumb {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem;
    }
    .breadcrumb a {
      color: var(--text-muted); text-decoration: none; cursor: pointer;
      transition: color 0.2s;
    }
    .breadcrumb a:hover { color: var(--text-primary); }
    .breadcrumb .bc-sep { opacity: 0.4; }
    .breadcrumb .bc-current { color: var(--accent); font-weight: 500; }

    /* ─── SVG Score Ring ─── */
    .score-ring-container {
      position: relative; width: 130px; height: 130px;
      margin: 0 auto 1.25rem;
      animation: scaleIn 0.5s var(--ease-spring);
    }
    .score-ring-bg {
      fill: none; stroke: var(--bg-tertiary); stroke-width: 8;
    }
    .score-ring-fill {
      fill: none; stroke-width: 8; stroke-linecap: round;
      transform: rotate(-90deg); transform-origin: center;
      stroke-dasharray: 339.292;
      stroke-dashoffset: 339.292;
      transition: stroke-dashoffset 1.2s var(--ease-out);
    }
    .score-ring-text {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;

// I18N

const LANGS = { es: LANG_ES, en: LANG_EN, pt: LANG_PT, fr: LANG_FR, de: LANG_DE, it: LANG_IT, zh: LANG_ZH, ja: LANG_JA, ar: LANG_AR, ru: LANG_RU, ko: LANG_KO, hi: LANG_HI };
function detectLang() {
  const supported = Object.keys(LANGS);
  for (const l of navigator.languages || [navigator.language]) {
    const code = l.split('-')[0].toLowerCase();
    if (supported.includes(code)) return code;
  }
  return 'en';
}
let currentLang = localStorage.getItem('mental_health_lang') || detectLang();
function t(key) {
  const keys = key.split('.');
  let val = LANGS[currentLang];
  for (const k of keys) { val = val?.[k]; }
  return val || key;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('mental_health_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.querySelector('#app-title h1').textContent = t('ui.appTitle');
  document.getElementById('app-subtitle').textContent = t('ui.appSubtitle');
  document.getElementById('tab-tests').textContent = t('ui.tabTests');
  document.getElementById('tab-history').textContent = t('ui.tabHistory');
  renderHome();
  if (activeTest && document.getElementById('screen-test').classList.contains('active')) {
    renderQuestion();
  }
}

// THEME
// ═══════════════════════════════════════════════════════════════
function getPreferredTheme() {
  const saved = localStorage.getItem('mental_health_theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('mental_health_theme', next);
  applyTheme(next);
}
applyTheme(getPreferredTheme());

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let activeTest = null;
let currentQ = 0;
let answers = [];
let historyFilter = 'all';
let chartInstance = null;

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
  const active = document.querySelector(`[data-tab="${tab}"]`);
  active.classList.add('active');
  active.setAttribute('aria-selected','true');
  if (tab === 'tests') {
    goHome();
  } else {
    showScreen('screen-history');
    renderHistory();
  }
}

function goHome() {
  activeTest = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="tests"]').classList.add('active');
  showScreen('screen-home');
}

function setAccentColor(color) {
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-light', color + 'BB');
  document.documentElement.style.setProperty('--accent-dark', color);
  document.documentElement.style.setProperty('--accent-glow', color + '22');
}

// ═══════════════════════════════════════════════════════════════
// HOME GRID
// ═══════════════════════════════════════════════════════════════
const TEST_CATEGORIES = [
  { key: 'triage', label: '¿Por dónde empezar?', ids: ['triage'] },
  { key: 'clinical', label: 'Evaluaciones Clínicas', ids: ['bdi','phq9','bai','gad7','pss','pcl5','isi','spin'] },
  { key: 'screening', label: 'Screening y Detección', ids: ['msibpd','mdq','asrs','audit','eat26','ocir'] },
  { key: 'wellbeing', label: 'Bienestar y Autoestima', ids: ['who5','rosenberg'] },
  { key: 'personality', label: 'Personalidad', ids: ['bfi44','mbti','ipip300'] },
  { key: 'advanced', label: 'Evaluación Avanzada', ids: ['pid5','ipip_mmpi'] },
];

// Translate test metadata: prefer i18n, fallback to hardcoded
function tt(testId, field) {
  const val = t(`tests.${testId}.${field}`);
  return val !== `tests.${testId}.${field}` ? val : TESTS[testId]?.[field] || '';
}

function renderHome() {
  const grid = document.getElementById('test-grid');
  grid.innerHTML = TEST_CATEGORIES.map(cat => {
    const tests = cat.ids.filter(id => TESTS[id]).map(id => TESTS[id]);
    if (!tests.length) return '';
    const catLabel = t(`ui.cat_${cat.key}`) !== `ui.cat_${cat.key}` ? t(`ui.cat_${cat.key}`) : cat.label;
    return `
      <div class="category-header" style="grid-column:1/-1;margin-top:0.75rem">
        <h2 style="font-family:var(--font-display);font-size:1rem;color:var(--text-secondary);margin-bottom:0.25rem">${catLabel}</h2>
      </div>
      ${tests.map(te => {
        const name = tt(te.id, 'fullName') || te.name;
        const desc = tt(te.id, 'desc') || te.desc;
        return `
        <div class="test-card" onclick="openTest('${te.id}')" onkeydown="event.key==='Enter'&&openTest('${te.id}')" tabindex="0" role="button" aria-label="${name}" style="--card-accent:${te.color}${te.id==='triage'?';grid-column:1/-1':''}">
          <div class="card-accent" style="background:${te.color}"></div>
          <div class="test-card-icon" style="background:${te.color}18" aria-hidden="true">${te.icon}</div>
          <div class="card-abbr">${te.abbr}</div>
          <h3>${name}</h3>
          <p>${desc}</p>
          <div class="card-meta">
            <span>${te.items} ${t('ui.items')}</span>
            <span>${te.time}</span>
          </div>
        </div>`;
      }).join('')}
    `;
  }).join('');
  // Stagger animations
  grid.querySelectorAll('.test-card, .category-header').forEach((el, i) => {
    el.style.animationDelay = `${i * 0.04}s`;
  });
}

// ═══════════════════════════════════════════════════════════════
// TEST FLOW
// ═══════════════════════════════════════════════════════════════
function openTest(id) {
  activeTest = TESTS[id];
  setAccentColor(activeTest.color);
  const wc = document.getElementById('welcome-content');
  wc.innerHTML = `
    <div class="welcome-icon" style="background:${activeTest.color}18">
      <span>${activeTest.icon}</span>
    </div>
    <h2>${tt(activeTest.id, 'fullName') || activeTest.fullName}</h2>
    <p>${tt(activeTest.id, 'instructions') || activeTest.instructions}</p>
    <div class="disclaimer">
      <strong>${t('ui.disclaimerTitle')}</strong> ${t('ui.disclaimerText')}
    </div>
    <div class="disclaimer" style="border-left-color:var(--privacy-border);background:var(--privacy-bg)">
      <span aria-hidden="true">🔒</span> <strong>${t('ui.privacyTitle')}</strong> ${t('ui.privacyText')}
    </div>
    <button class="btn btn-primary" onclick="startTest()">${t('ui.startTest')}</button>
    <br><br>
    <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
  `;
  showScreen('screen-welcome');
}

function startTest() {
  currentQ = 0;
  answers = new Array(activeTest.questions.length).fill(null);
  showScreen('screen-test');
  document.getElementById('progress-fill').style.background =
    `linear-gradient(90deg, ${activeTest.color}BB, ${activeTest.color})`;
  updateBreadcrumb();
  renderQuestion();
  saveProgress();
}

function updateBreadcrumb() {
  document.getElementById('test-breadcrumb').innerHTML = `
    <a onclick="goHome()">${t('ui.tabTests')}</a>
    <span class="bc-sep">›</span>
    <span class="bc-current">${activeTest.abbr}</span>
  `;
}

function saveProgress() {
  if (!activeTest) return;
  localStorage.setItem('mental_health_progress', JSON.stringify({
    testId: activeTest.id, currentQ, answers
  }));
}

function clearProgress() {
  localStorage.removeItem('mental_health_progress');
}

function checkResume() {
  const saved = localStorage.getItem('mental_health_progress');
  if (!saved) return;
  const data = JSON.parse(saved);
  if (!TESTS[data.testId] || data.answers.every(a => a === null)) {
    clearProgress(); return;
  }
  const resumeTest_ = TESTS[data.testId];
  const grid = document.getElementById('test-grid');
  const banner = document.createElement('div');
  banner.className = 'resume-banner';
  banner.id = 'resume-banner';
  const answered = data.answers.filter(a=>a!==null).length;
  banner.innerHTML = `
    <p>${t('ui.resumeMessage').replace('{test}', resumeTest_.abbr).replace('{n}', answered).replace('{total}', resumeTest_.questions.length)}</p>
    <button class="btn btn-primary" onclick="resumeTest()">${t('ui.continueTest')}</button>
    <button class="btn btn-ghost" onclick="dismissResume()" aria-label="${t('ui.dismiss')}">✕</button>
  `;
  grid.parentNode.insertBefore(banner, grid);
}

function resumeTest() {
  const data = JSON.parse(localStorage.getItem('mental_health_progress'));
  if (!data) return;
  activeTest = TESTS[data.testId];
  currentQ = data.currentQ;
  answers = data.answers;
  setAccentColor(activeTest.color);
  showScreen('screen-test');
  document.getElementById('progress-fill').style.background =
    `linear-gradient(90deg, ${activeTest.color}BB, ${activeTest.color})`;
  updateBreadcrumb();
  renderQuestion();
  const banner = document.getElementById('resume-banner');
  if (banner) banner.remove();
}

function dismissResume() {
  clearProgress();
  const banner = document.getElementById('resume-banner');
  if (banner) banner.remove();
}

function getTranslatedQuestion(testId, idx) {
  const tq = t(`tests.${testId}.questions`);
  if (Array.isArray(tq) && tq[idx]) return tq[idx];
  return null;
}
function getTranslatedOptions(testId, idx) {
  const tq = getTranslatedQuestion(testId, idx);
  if (tq && tq.options) return tq.options;
  const so = t(`tests.${testId}.sharedOptions`);
  if (Array.isArray(so)) return so;
  return null;
}

function renderQuestion() {
  const test = activeTest;
  const q = test.questions[currentQ];
  const total = test.questions.length;
  const pct = Math.round((currentQ / total) * 100);

  // Get translated content or fall back to hardcoded
  const tq = getTranslatedQuestion(test.id, currentQ);
  const title = tq?.title || q.title;
  const opts = getTranslatedOptions(test.id, currentQ) || test.sharedOptions || q.options;

  document.getElementById('progress-text').textContent = `${t('ui.question')} ${currentQ + 1} ${t('ui.of')} ${total}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-number" style="color:${test.color}">${t('ui.question')} ${currentQ + 1} · ${title || test.abbr}</div>
    <div class="question-title">${title}</div>
    <div class="options" role="radiogroup" aria-label="${title}">
      ${opts.map((opt, i) => `
        <div class="option">
          <input type="radio" name="q${currentQ}" id="q${currentQ}_${i}" value="${i}"
            ${answers[currentQ] === i ? 'checked' : ''}
            onchange="selectAnswer(${i})">
          <label for="q${currentQ}_${i}">
            <span class="option-radio"></span>
            <span>${typeof opt === 'string' ? opt : opt.text || opt}</span>
          </label>
        </div>
      `).join('')}
    </div>
  `;
  area.style.animation = 'none'; area.offsetHeight; area.style.animation = '';

  document.getElementById('btn-prev').disabled = currentQ === 0;
  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = answers[currentQ] === null;
  btnNext.textContent = currentQ === total - 1 ? t('ui.viewResults') : t('ui.nextQuestion') + ' →';
}

function selectAnswer(val) {
  answers[currentQ] = val;
  document.getElementById('btn-next').disabled = false;
  saveProgress();
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ < activeTest.questions.length - 1) {
    currentQ++;
    renderQuestion();
    saveProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
    saveProgress();
  }
}

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
function calcScore() {
  const test = activeTest;
  let score = 0;
  answers.forEach((val, i) => {
    if (val === null) return;
    if (test.scoreAnswer) score += test.scoreAnswer(i, val);
    else score += val;
  });
  return score;
}

function showResults() {
  const test = activeTest;
  const score = calcScore();
  const needsAnswers = ['type','dimensions','domains','scales','triage'].includes(test.maxScore);
  const result = needsAnswers ? test.getResult(score, answers) : test.getResult(score);

  // Overlay i18n translations on result
  if (result.key) {
    const tr = t(`tests.${test.id}.results.${result.key}`);
    if (tr && typeof tr === 'object') {
      if (tr.label) result.label = tr.label;
      if (tr.desc) result.desc = tr.desc;
    }
  }

  // Save
  const history = JSON.parse(localStorage.getItem('mental_health_history') || '[]');
  const histEntry = {
    testId: test.id, testName: test.abbr, date: new Date().toISOString(),
    score, maxScore: test.maxScore, resultKey: result.key,
    resultLabel: result.label, resultColor: result.color, answers: [...answers]
  };
  if (result.typeDetails) histEntry.typeCode = result.typeDetails.type;
  history.push(histEntry);
  localStorage.setItem('mental_health_history', JSON.stringify(history));
  clearProgress();

  const rc = document.getElementById('results-content');

  // ─── MBTI type result ───
  if (test.maxScore === 'type' && result.typeDetails) {
    const td = result.typeDetails;
    rc.innerHTML = `
      <div>
        <div class="type-display" style="color:${result.color}">${td.type}</div>
        <div class="type-name">${td.name}</div>
      </div>
      <p class="score-description">${td.description}</p>

      <div class="breakdown" style="margin-top:1.5rem">
        <h3>${t('ui.detailByItem')}</h3>
        ${td.dimensions.map(d => {
          const total = d.score1 + d.score2;
          const pct1 = Math.round((d.score1 / total) * 100);
          return `<div class="dichotomy-row">
            <span class="dichotomy-label">${d.pole1}</span>
            <div class="dichotomy-bar">
              <div class="dichotomy-bar-fill" style="width:${pct1}%;background:${result.color};left:0" data-width="${pct1}"></div>
            </div>
            <span class="dichotomy-label-right">${d.pole2}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="startTest()">${t('ui.repeatTest')}</button>
        <button class="btn btn-outline" onclick="switchTab('history')">${t('ui.viewHistory')}</button>
        <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
      </div>
    `;
    showScreen('screen-results');
    setTimeout(() => {
      document.querySelectorAll('.dichotomy-bar-fill').forEach((bar, i) => {
        const w = bar.dataset.width;
        bar.style.width = '0%';
        setTimeout(() => { bar.style.width = w + '%'; }, 100 + i * 150);
      });
    }, 50);
    return;
  }

  // ─── Dimensions result (BFI-44 / IPIP-300) ───
  if (test.maxScore === 'dimensions' && result.dimensions) {
    const hasFacets = result.dimensions.some(d => d.facets);
    rc.innerHTML = `
      <div>
        <div class="score-category" style="color:${result.color};font-size:1.4rem">${result.label}</div>
      </div>
      <p class="score-description">${result.desc}</p>

      <div class="breakdown" style="margin-top:1rem">
        ${result.dimensions.map(d => {
          const pct = Math.round((d.score / 5) * 100);
          let facetsHTML = '';
          if (d.facets) {
            facetsHTML = '<div style="margin:0.5rem 0 0.75rem 0.5rem">' + d.facets.map(f => {
              const fp = Math.round((f.score / 5) * 100);
              return `<div style="margin-bottom:0.4rem">
                <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);margin-bottom:0.15rem">
                  <span>${f.name}</span><span>${f.score.toFixed(1)}</span>
                </div>
                <div class="dimension-bar" style="height:5px">
                  <div class="dimension-bar-fill" style="width:0%;background:${result.color}88" data-width="${fp}"></div>
                </div>
              </div>`;
            }).join('') + '</div>';
          }
          return `<div class="dimension-result">
            <div class="dimension-header">
              <span class="dimension-name">${d.name}</span>
              <span class="dimension-score" style="color:${result.color}">${d.score.toFixed(1)}/5</span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-bar-fill" style="width:0%;background:${result.color}" data-width="${pct}"></div>
            </div>
            <div class="dimension-desc">${d.description}</div>
            ${facetsHTML}
          </div>`;
        }).join('')}
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="startTest()">${t('ui.repeatTest')}</button>
        <button class="btn btn-outline" onclick="switchTab('history')">${t('ui.viewHistory')}</button>
        <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
      </div>
    `;
    showScreen('screen-results');
    setTimeout(() => {
      document.querySelectorAll('.dimension-bar-fill').forEach((bar, i) => {
        setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 50 + i * 60);
      });
    }, 50);
    return;
  }

  // ─── PID-5 domains result ───
  if (test.maxScore === 'domains' && result.domains) {
    const elevated = result.domains.filter(d => d.elevated).length;
    rc.innerHTML = `
      <div>
        <div class="score-ring-container">
          <svg width="130" height="130" viewBox="0 0 120 120">
            <circle class="score-ring-bg" cx="60" cy="60" r="54"/>
            <circle class="score-ring-fill" cx="60" cy="60" r="54"
              stroke="${result.color}" id="score-ring-anim"/>
          </svg>
          <div class="score-ring-text">
            <span class="score-ring-number" style="font-size:1.5rem">${elevated}/5</span>
            <span class="score-ring-label">${t('ui.elevated') || 'elevated'}</span>
          </div>
        </div>
        <div class="score-category" style="color:${result.color}">${result.label}</div>
      </div>
      <p class="score-description">${result.desc}</p>

      <div class="breakdown" style="margin-top:1rem">
        ${result.domains.map(d => {
          const pct = Math.round((d.score / 3) * 100);
          const domColor = d.elevated ? '#A65D57' : '#6B8F71';
          let facetsHTML = '<div style="margin:0.4rem 0 0.75rem 0.5rem">' + d.facets.map(f => {
            const fp = Math.round((f.score / 3) * 100);
            const fc = f.elevated ? '#A65D57' : 'var(--text-muted)';
            return `<div style="margin-bottom:0.35rem">
              <div style="display:flex;justify-content:space-between;font-size:0.68rem;margin-bottom:0.1rem">
                <span style="color:${fc};${f.elevated?'font-weight:600':''}">${f.name}${f.elevated?' ⚠':''}️</span>
                <span style="color:${fc}">${f.score.toFixed(1)}/3</span>
              </div>
              <div class="dimension-bar" style="height:4px">
                <div class="dimension-bar-fill" style="width:0%;background:${f.elevated?'#A65D57':result.color+'88'}" data-width="${fp}"></div>
              </div>
            </div>`;
          }).join('') + '</div>';
          return `<div class="dimension-result">
            <div class="dimension-header">
              <span class="dimension-name" style="color:${domColor}">${d.name}${d.elevated?' ⚠':''}️</span>
              <span class="dimension-score" style="color:${domColor}">${d.score.toFixed(2)}/3</span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-bar-fill" style="width:0%;background:${domColor}" data-width="${pct}"></div>
            </div>
            ${facetsHTML}
          </div>`;
        }).join('')}
      </div>

      <div class="resources-box">
        <h4>${t('ui.helpResources')}</h4>
        <p>${t('ui.helpText')}</p>
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="startTest()">${t('ui.repeatTest')}</button>
        <button class="btn btn-outline" onclick="switchTab('history')">${t('ui.viewHistory')}</button>
        <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
      </div>
    `;
    showScreen('screen-results');
    const circ = 339.292;
    const off = circ - ((elevated / 5) * circ);
    requestAnimationFrame(() => {
      const ring = document.getElementById('score-ring-anim');
      if (ring) ring.style.strokeDashoffset = off;
    });
    setTimeout(() => {
      document.querySelectorAll('.dimension-bar-fill').forEach((bar, i) => {
        setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 30 + i * 40);
      });
    }, 50);
    return;
  }

  // ─── IPIP-MMPI scales result ───
  if (test.maxScore === 'scales' && result.clinicalScales) {
    const elevatedCount = result.clinicalScales.filter(s => s.elevated).length;
    rc.innerHTML = `
      <div>
        <div class="score-category" style="color:${result.color};font-size:1.3rem">${result.label}</div>
      </div>
      <p class="score-description">${result.desc}</p>

      ${result.validityScales ? `
      <div class="breakdown" style="margin-top:1rem">
        <h3>${t('ui.validityScales') || 'Validity Scales'}</h3>
        ${result.validityScales.map(s => {
          const pct = Math.min(100, Math.round(((s.tScore || 50) / 100) * 100));
          const c = (s.tScore||50) >= 65 ? '#A65D57' : '#6B8F71';
          return `<div class="breakdown-item">
            <span class="breakdown-name" style="color:${c};${(s.tScore||50)>=65?'font-weight:600':''}">${s.name}</span>
            <div class="breakdown-bar-bg" style="flex:0 0 80px">
              <div class="breakdown-bar-fill" style="width:${pct}%;background:${c}" data-width="${pct}"></div>
            </div>
            <span class="breakdown-value" style="background:${c}20;color:${c}">T=${s.tScore||50}</span>
          </div>`;
        }).join('')}
      </div>` : ''}

      <div class="breakdown" style="margin-top:1rem">
        <h3>${t('ui.clinicalScales') || 'Clinical Scales'}${elevatedCount>0?` (${elevatedCount} ${t('ui.elevated') || 'elevated'})</h3>`:' </h3>'}
        ${result.clinicalScales.map(s => {
          const pct = Math.min(100, Math.round(((s.tScore || 50) / 100) * 100));
          const c = s.elevated ? '#A65D57' : (s.tScore||50) >= 55 ? '#C9A227' : '#6B8F71';
          return `<div class="breakdown-item">
            <span class="breakdown-name" style="color:${c};${s.elevated?'font-weight:600':''}">${s.name}${s.elevated?' ⚠️':''}</span>
            <div class="breakdown-bar-bg" style="flex:0 0 80px">
              <div class="breakdown-bar-fill" style="width:0%;background:${c}" data-width="${pct}"></div>
            </div>
            <span class="breakdown-value" style="background:${c}20;color:${c}">T=${s.tScore||50}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="resources-box">
        <h4>${t('ui.helpResources')}</h4>
        <p>${t('ui.helpText')}</p>
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="startTest()">${t('ui.repeatTest')}</button>
        <button class="btn btn-outline" onclick="switchTab('history')">${t('ui.viewHistory')}</button>
        <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
      </div>
    `;
    showScreen('screen-results');
    setTimeout(() => {
      document.querySelectorAll('.breakdown-bar-fill').forEach((bar, i) => {
        setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 50 + i * 50);
      });
    }, 50);
    return;
  }

  // ─── Triage result ───
  if (test.maxScore === 'triage' && result.recommendations) {
    const priorityLabels = { high: t('ui.highPriority') || '🔴 High priority', medium: t('ui.recommended') || '🟡 Recommended', suggested: t('ui.suggested') || '🟢 Suggested' };
    const priorityOrder = { high: 0, medium: 1, suggested: 2 };
    const sortedRecs = [...result.recommendations].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

    rc.innerHTML = `
      <div>
        <div class="score-category" style="color:${result.color};font-size:1.3rem">${result.label}</div>
      </div>
      <p class="score-description">${result.desc}</p>

      <div class="breakdown" style="margin-top:1rem">
        <h3>${t('ui.areasEvaluated') || 'Areas evaluated'}</h3>
        ${result.domainScores.map(d => {
          const pct = Math.round((d.score / d.maxScore) * 100);
          const c = d.score >= 3 ? '#A65D57' : d.score >= 2 ? '#C9A227' : '#6B8F71';
          return `<div class="breakdown-item">
            <span class="breakdown-name">${d.name}</span>
            <div class="breakdown-bar-bg">
              <div class="breakdown-bar-fill" style="width:0%;background:${c}" data-width="${pct}"></div>
            </div>
            <span class="breakdown-value" style="background:${c}20;color:${c}">${d.score}/4</span>
          </div>`;
        }).join('')}
      </div>

      <div style="margin-top:1.5rem">
        <h3 style="font-family:var(--font-display);font-size:1rem;margin-bottom:0.75rem">${t('ui.recommendedTests') || 'Recommended assessments'} (${sortedRecs.length})</h3>
        ${sortedRecs.map(rec => {
          const rt = TESTS[rec.testId];
          if (!rt) return '';
          return `<div class="test-card" onclick="openTest('${rec.testId}')" style="--card-accent:${rt.color};cursor:pointer;margin-bottom:0.5rem">
            <div class="card-accent" style="background:${rt.color}"></div>
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
              <span style="font-size:1.2rem">${rt.icon}</span>
              <strong>${rt.abbr}</strong>
              <span style="font-size:0.7rem;padding:2px 6px;border-radius:4px;background:${rec.priority==='high'?'#A65D5720':rec.priority==='medium'?'#C9A22720':'#6B8F7120'};color:${rec.priority==='high'?'#A65D57':rec.priority==='medium'?'#C9A227':'#6B8F71'}">${priorityLabels[rec.priority]}</span>
            </div>
            <div style="font-size:0.8rem;color:var(--text-secondary)">${rt.name}</div>
            <div style="font-size:0.72rem;color:var(--text-muted);margin-top:0.15rem">${rec.reason}</div>
          </div>`;
        }).join('')}
      </div>

      <div class="results-actions">
        <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
      </div>
    `;
    showScreen('screen-results');
    setTimeout(() => {
      document.querySelectorAll('.breakdown-bar-fill').forEach((bar, i) => {
        setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 50 + i * 50);
      });
    }, 50);
    return;
  }

  // ─── Standard score result ───
  const pctScore = Math.round((score / test.maxScore) * 100);
  const circumference = 339.292;
  const offset = circumference - (pctScore / 100) * circumference;

  rc.innerHTML = `
    <div>
      <div class="score-ring-container">
        <svg width="130" height="130" viewBox="0 0 120 120">
          <circle class="score-ring-bg" cx="60" cy="60" r="54"/>
          <circle class="score-ring-fill" cx="60" cy="60" r="54"
            stroke="${result.color}" id="score-ring-anim"/>
        </svg>
        <div class="score-ring-text">
          <span class="score-ring-number">${score}</span>
          <span class="score-ring-label">${t('ui.outOf')} ${test.maxScore}</span>
        </div>
      </div>
      <div class="score-category" style="color:${result.color}">${result.label}</div>
    </div>
    <p class="score-description">${result.desc}</p>

    <div class="breakdown">
      <h3>${t('ui.detailByItem')}</h3>
      ${test.questions.map((q, i) => {
        const val = answers[i] ?? 0;
        const maxOpt = (test.sharedOptions || q.options).length - 1;
        const scored = test.scoreAnswer ? test.scoreAnswer(i, val) : val;
        const pct = maxOpt > 0 ? scored / maxOpt : 0;
        const barPct = Math.round(pct * 100);
        const c = pct <= 0.33 ? '#6B8F71' : pct <= 0.66 ? '#C9A227' : '#A65D57';
        return `<div class="breakdown-item">
          <span class="breakdown-name">${q.title}</span>
          <div class="breakdown-bar-bg">
            <div class="breakdown-bar-fill" style="width:${barPct}%;background:${c}" data-width="${barPct}"></div>
          </div>
          <span class="breakdown-value" style="background:${c}20;color:${c}">${scored}/${maxOpt}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="resources-box">
      <h4>${t('ui.helpResources')}</h4>
      <p>${t('ui.helpText')}</p>
    </div>

    <div class="results-actions">
      <button class="btn btn-primary" onclick="startTest()">${t('ui.repeatTest')}</button>
      <button class="btn btn-outline" onclick="switchTab('history')">${t('ui.viewHistory')}</button>
      <button class="btn btn-ghost" onclick="goHome()">← ${t('ui.otherTests')}</button>
    </div>
  `;
  showScreen('screen-results');

  // Animate SVG ring
  requestAnimationFrame(() => {
    const ring = document.getElementById('score-ring-anim');
    if (ring) ring.style.strokeDashoffset = offset;
  });

  // Animate breakdown bars (stagger)
  document.querySelectorAll('.breakdown-bar-fill').forEach((bar, i) => {
    bar.style.width = '0%';
    setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 100 + i * 40);
  });
}

// ═══════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════
function renderHistory() {
  const history = JSON.parse(localStorage.getItem('mental_health_history') || '[]');
  const container = document.getElementById('history-content');

  if (history.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <div style="font-size:2rem;opacity:0.4;margin-bottom:0.75rem">📊</div>
        <p>${t('ui.noRecords')}</p>
        <p style="font-size:0.78rem;margin-top:0.25rem;color:var(--text-muted)">${t('ui.completeFirst')}</p>
        <button class="btn btn-primary" style="margin-top:1rem" onclick="switchTab('tests')">${t('ui.goToTests')}</button>
      </div>
    `;
    return;
  }

  // Get unique test types in history
  const testTypes = [...new Set(history.map(h => h.testId))];

  // Filter
  const filtered = historyFilter === 'all' ? history : history.filter(h => h.testId === historyFilter);
  const sorted = [...filtered].reverse();

  // Chart
  let chartHTML = '';
  if (filtered.length >= 2) {
    chartHTML = `
      <div class="chart-container">
        <h3>${t('ui.trend')}</h3>
        <div class="chart-wrapper"><canvas id="trend-chart"></canvas></div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="history-filter">
      <button class="filter-btn ${historyFilter==='all'?'active':''}" onclick="setFilter('all')">${t('ui.all')}</button>
      ${testTypes.map(id => {
        const t = TESTS[id];
        return `<button class="filter-btn ${historyFilter===id?'active':''}" onclick="setFilter('${id}')">${t.abbr}</button>`;
      }).join('')}
    </div>
    ${chartHTML}
    <div class="history-list">
      ${sorted.map((entry, idx) => {
        const date = new Date(entry.date);
        const dateStr = date.toLocaleDateString(currentLang, { day:'numeric', month:'short', year:'numeric' });
        const timeStr = date.toLocaleTimeString(currentLang, { hour:'2-digit', minute:'2-digit' });
        const prev = sorted[idx + 1];
        let trend = '';
        if (prev && prev.testId === entry.testId) {
          if (entry.score < prev.score) trend = '<span class="history-trend" style="color:#6B8F71">▲</span>';
          else if (entry.score > prev.score) trend = '<span class="history-trend" style="color:#A65D57">▼</span>';
          else trend = '<span class="history-trend" style="color:var(--text-muted)">—</span>';
        }
        return `
          <div class="history-entry">
            <div class="history-dot" style="background:${entry.resultColor}"></div>
            <div class="history-info">
              <div class="history-date">${dateStr} · ${timeStr}</div>
              <div class="history-score-text">${t('ui.score')}: ${entry.score}/${entry.maxScore}</div>
              <div class="history-test-name">${TESTS[entry.testId]?.name || entry.testName}</div>
            </div>
            <span class="history-badge" style="background:${entry.resultColor}">${entry.resultLabel}</span>
            ${trend}
          </div>
        `;
      }).join('')}
    </div>
    <div class="clear-history">
      <button class="btn btn-ghost" onclick="clearHistory()">${t('ui.clearHistory')}</button>
    </div>
  `;

  if (filtered.length >= 2) setTimeout(() => renderChart(filtered), 80);
}

function setFilter(f) { historyFilter = f; renderHistory(); }

function renderChart(data) {
  const canvas = document.getElementById('trend-chart');
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const ctx = canvas.getContext('2d');
  const labels = data.map(e => {
    const d = new Date(e.date);
    return d.toLocaleDateString(currentLang, { day:'numeric', month:'short' });
  });

  // Group by test type
  const byTest = {};
  data.forEach(e => {
    if (!byTest[e.testId]) byTest[e.testId] = [];
    byTest[e.testId].push(e);
  });

  const datasets = Object.entries(byTest).map(([id, entries]) => {
    const t = TESTS[id];
    const d = new Array(data.length).fill(null);
    entries.forEach(e => {
      const idx = data.indexOf(e);
      d[idx] = Math.round((e.score / e.maxScore) * 100);
    });
    return {
      label: t.abbr,
      data: d,
      borderColor: t.color,
      backgroundColor: t.color + '18',
      fill: false,
      tension: 0.35,
      pointBackgroundColor: t.color,
      pointRadius: 4,
      pointHoverRadius: 6,
      borderWidth: 2,
      spanGaps: true,
    };
  });

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: {
          min: 0, max: 100,
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { family:"'DM Sans',sans-serif", size:10 }, color:'#8A847C', callback: v => v+'%' }
        },
        x: {
          grid: { display: false },
          ticks: { font: { family:"'DM Sans',sans-serif", size:10 }, color:'#8A847C' }
        }
      },
      plugins: {
        legend: {
          display: datasets.length > 1,
          labels: { font: { family:"'DM Sans',sans-serif", size:11 }, usePointStyle: true, pointStyle:'circle' }
        },
        tooltip: {
          backgroundColor: '#2D2A26',
          titleFont: { family:"'DM Sans',sans-serif" },
          bodyFont: { family:"'DM Sans',sans-serif" },
          padding: 8, cornerRadius: 8,
          callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}%` }
        }
      }
    }
  });
}

function clearHistory() {
  if (confirm(t('ui.clearConfirm'))) {
    localStorage.removeItem('mental_health_history');
    renderHistory();
  }
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD NAV
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-test').classList.contains('active')) return;
  const opts = activeTest.sharedOptions || activeTest.questions[currentQ].options;
  if (e.key >= '1' && e.key <= String(opts.length)) {
    const idx = parseInt(e.key) - 1;
    const r = document.getElementById(`q${currentQ}_${idx}`);
    if (r) { r.checked = true; selectAnswer(idx); }
  }
  if (e.key === 'ArrowRight' || e.key === 'Enter') { if (answers[currentQ] !== null) nextQuestion(); }
  if (e.key === 'ArrowLeft') prevQuestion();
  if (e.key === 'Escape') goHome();
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
setLang(currentLang);
checkResume();
</script>
